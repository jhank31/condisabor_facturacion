server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compresión gzip ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Cache de assets con hash en el nombre (Vite) ─────────
    # Estos archivos nunca cambian su contenido si el hash cambia,
    # por lo que se pueden cachear de forma agresiva.
    location ~* /assets/.*\.(js|css|woff2?|ttf|ico|png|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Proxy hacia el backend ────────────────────────────────
    # Todas las peticiones a /api se reenvían al contenedor backend.
    location /api/ {
        proxy_pass         http://backend:3000/api/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts para uploads de PDF (puede tardar más)
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # Tamaño máximo de body para upload de facturas PDF
        client_max_body_size 15M;
    }

    # ── SPA fallback ─────────────────────────────────────────
    # Cualquier ruta que no sea un archivo estático real
    # se sirve con index.html para que React Router la maneje.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Ocultar versión de nginx ──────────────────────────────
    server_tokens off;

    # ── Health check de nginx ─────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
