# ============================================================
# CONDISABOR — Producción (Backend + Frontend)
# Supabase: cloud (no requiere contenedores locales)
# ============================================================
# Uso:
#   docker compose -f docker-compose.prod.yml up -d --build
# ============================================================

services:

  # ── Backend Node.js ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: condisabor-backend
    restart: unless-stopped
    env_file: ./backend/.env
    expose:
      - "3000"
    networks:
      - condisabor-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Frontend React + Nginx ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: condisabor-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - condisabor-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

networks:
  condisabor-net:
    driver: bridge
